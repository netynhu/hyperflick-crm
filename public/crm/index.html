<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HyperFlick — CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f4f5f8;--panel:#fff;--panel-2:#f8f9fb;
    --ink:#15171d;--ink-2:#3a3d46;--muted:#6b7280;--faint:#9ca3af;
    --border:#e8eaee;--border-2:#eef0f3;
    --orange:#f5611e;--orange-deep:#e24f10;--orange-soft:#fff1ea;
    --green:#0f9d58;--green-bg:#e8f6ee;--red:#e5484d;--red-bg:#fdecec;--yellow:#b7791f;--yellow-bg:#fbf3e3;
    --purple:#7c5cff;
    --sb:#0e1018;--sb-2:#161a26;--sb-ink:#e7e9ef;--sb-muted:#8b90a0;--sb-hover:#1c2130;
    --sh-sm:0 1px 2px rgba(16,24,40,.05),0 1px 3px rgba(16,24,40,.05);
    --sh-md:0 4px 14px rgba(16,24,40,.08);--sh-lg:0 16px 44px rgba(16,24,40,.16);
  }
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',-apple-system,Segoe UI,Roboto,sans-serif}
  body{background:var(--bg);color:var(--ink);font-size:14px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;letter-spacing:-.011em}
  ::-webkit-scrollbar{height:10px;width:10px}::-webkit-scrollbar-thumb{background:#d7dae0;border-radius:6px}::-webkit-scrollbar-thumb:hover{background:#c3c7cf}
  a{color:var(--orange-deep);text-decoration:none}a:hover{text-decoration:underline}
  button{font-family:inherit;cursor:pointer}
  .hidden{display:none!important}

  /* ---------- LAYOUT: sidebar + content ---------- */
  .layout{display:flex;min-height:100vh}
  .sidebar{width:236px;flex:0 0 236px;background:var(--sb);color:var(--sb-ink);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  .sb-brand{display:flex;align-items:center;gap:11px;font-weight:800;font-size:17px;letter-spacing:-.02em;padding:20px 20px 14px}
  .sb-brand .logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#ff8a3a,#f5521e);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 20px -8px rgba(245,82,30,.7)}
  .sb-brand .logo svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2}
  .sb-brand b{color:#ff8a3a}
  .sb-label{font-size:10.5px;font-weight:700;letter-spacing:1.2px;color:var(--sb-muted);text-transform:uppercase;padding:14px 22px 8px}
  .sb-nav{display:flex;flex-direction:column;gap:3px;padding:0 12px;flex:1;overflow-y:auto}
  .sb-nav button{display:flex;align-items:center;gap:12px;background:transparent;border:none;color:var(--sb-muted);padding:10px 12px;border-radius:10px;font-weight:600;font-size:14px;text-align:left;transition:all .15s;width:100%}
  .sb-nav button svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.9;flex:0 0 auto}
  .sb-nav button:hover{background:var(--sb-hover);color:var(--sb-ink)}
  .sb-nav button.active{background:linear-gradient(135deg,rgba(245,97,30,.22),rgba(245,82,30,.1));color:#fff;box-shadow:inset 0 0 0 1px rgba(245,97,30,.35)}
  .sb-nav button.active svg{stroke:#ff8a3a}
  .sb-foot{padding:14px;border-top:1px solid rgba(255,255,255,.06)}
  .sb-user{display:flex;align-items:center;gap:10px;padding:8px;border-radius:10px}
  .sb-user .av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#16a36b,#0f9d58);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;flex:0 0 auto}
  .sb-user .who{overflow:hidden}
  .sb-user .who .em{font-size:12.5px;font-weight:600;color:var(--sb-ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px}
  .sb-user .who .st{font-size:11px;color:#3fbf86}
  .sb-foot .out{margin-top:10px;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;background:var(--sb-2);border:1px solid rgba(255,255,255,.07);color:var(--sb-ink);padding:9px;border-radius:10px;font-weight:600;font-size:13px;transition:.15s}
  .sb-foot .out:hover{background:var(--sb-hover)}
  .sb-foot .out svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2}

  .content{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{position:sticky;top:0;z-index:30;background:rgba(244,245,248,.82);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;padding:15px 28px}
  .topbar .ttl{font-size:20px;font-weight:800;letter-spacing:-.02em;color:var(--ink)}
  .topbar .sub{font-size:12.5px;color:var(--muted);margin-top:1px}
  .wa-status{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted);font-weight:600;background:var(--panel);border:1px solid var(--border);padding:7px 12px;border-radius:99px;box-shadow:var(--sh-sm)}
  .dot{width:8px;height:8px;border-radius:50%;background:#c7ccd4}.dot.on{background:var(--green);box-shadow:0 0 0 3px rgba(15,157,88,.16)}.dot.off{background:var(--red)}
  main{padding:24px 28px 40px;max-width:1320px;width:100%;margin:0 auto}

  /* ---------- GRADIENT CARDS ---------- */
  .gcards{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:16px;margin-bottom:24px}
  .gcard{border-radius:18px;padding:20px 22px;color:#fff;position:relative;overflow:hidden;box-shadow:0 14px 34px -16px rgba(16,24,40,.5);min-height:118px}
  .gcard::after{content:"";position:absolute;right:-30px;top:-30px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,.10)}
  .gcard .lbl{font-size:12.5px;font-weight:600;opacity:.9}
  .gcard .val{font-size:30px;font-weight:800;letter-spacing:-.03em;margin-top:10px;line-height:1}
  .gcard .sub{font-size:12px;opacity:.82;margin-top:8px}
  .g-dark{background:linear-gradient(140deg,#222838,#11141d)}
  .g-purple{background:linear-gradient(140deg,#8a6bff,#6a3df0)}
  .g-green{background:linear-gradient(140deg,#22b573,#0f9d58)}
  .g-red{background:linear-gradient(140deg,#f4686d,#e23b40)}
  .g-orange{background:linear-gradient(140deg,#ff8a3a,#ef5a12)}
  .g-blue{background:linear-gradient(140deg,#3aa0ff,#1f6fe0)}

  .grid-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px}
  .stat{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:17px 19px;box-shadow:var(--sh-sm)}
  .stat .lbl{color:var(--muted);font-size:12.5px;font-weight:600}
  .stat .val{font-size:25px;font-weight:800;margin-top:7px;letter-spacing:-.03em;color:var(--ink)}
  .stat .val.green{color:var(--green)}.stat .val.orange{color:var(--orange-deep)}.stat .val.red{color:var(--red)}.stat .val.yellow{color:var(--yellow)}.stat .val.purple{color:var(--purple)}
  .section-h{font-size:13px;font-weight:700;margin:6px 0 14px;color:var(--ink-2);text-transform:uppercase;letter-spacing:.4px;display:flex;align-items:center;gap:8px}

  /* funnel bar (overview) */
  .funnel{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:18px 20px;box-shadow:var(--sh-sm);margin-bottom:24px}
  .funnel .row-f{display:flex;align-items:center;gap:12px;margin:10px 0}
  .funnel .nm{width:96px;font-size:13px;font-weight:600;color:var(--ink-2)}
  .funnel .bar{flex:1;height:12px;background:var(--border-2);border-radius:99px;overflow:hidden}
  .funnel .bar i{display:block;height:100%;border-radius:99px}
  .funnel .ct{width:34px;text-align:right;font-weight:700;font-size:13px;color:var(--ink)}

  /* ---------- KANBAN ---------- */
  .board{display:grid;grid-template-columns:repeat(5,minmax(230px,1fr));gap:14px;align-items:start;overflow-x:auto;padding-bottom:12px}
  .col{background:var(--panel-2);border:1px solid var(--border);border-radius:16px;padding:6px;min-height:160px;transition:.15s}
  .col.drag{border-color:var(--orange);background:var(--orange-soft);box-shadow:inset 0 0 0 1px var(--orange)}
  .col-top{height:4px;border-radius:99px;margin:4px 6px 0}
  .col-h{display:flex;align-items:center;justify-content:space-between;padding:11px 10px 6px;font-weight:700;font-size:12.5px;color:var(--ink)}
  .col-h .lft{display:flex;align-items:center;gap:8px}
  .col-h .count{background:var(--panel);border:1px solid var(--border);color:var(--muted);border-radius:99px;padding:1px 9px;font-size:11.5px;font-weight:700}
  .col-sum{padding:0 10px 8px;font-size:12px;font-weight:700;color:var(--green)}
  .col-body{padding:4px 6px 8px;min-height:60px}
  .lead-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:12px 13px;margin-bottom:9px;cursor:grab;box-shadow:var(--sh-sm);transition:all .15s}
  .lead-card:hover{border-color:#d6d8de;box-shadow:var(--sh-md);transform:translateY(-1px)}
  .lead-card:active{cursor:grabbing}
  .lead-card .nm{font-weight:700;font-size:13.5px;color:var(--ink)}
  .lead-card .ph{color:var(--muted);font-size:12px;margin-top:3px;display:flex;align-items:center;gap:5px}
  .lead-card .ph svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2}
  .lead-card .foot{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-top:9px}
  .lead-card .dv{font-size:12.5px;font-weight:800;color:var(--ink)}
  .tag{display:inline-flex;align-items:center;gap:4px;background:var(--orange-soft);color:var(--orange-deep);border-radius:7px;padding:2px 8px;font-size:11px;font-weight:700}
  .tag.warn{background:var(--yellow-bg);color:var(--yellow)}.tag.exp{background:var(--red-bg);color:var(--red)}.tag.plain{background:var(--border-2);color:var(--ink-2)}

  table{width:100%;border-collapse:collapse;background:var(--panel);border-radius:14px;overflow:hidden;border:1px solid var(--border);box-shadow:var(--sh-sm)}
  th,td{text-align:left;padding:13px 16px;border-bottom:1px solid var(--border-2);font-size:13px;color:var(--ink-2)}
  th{color:var(--faint);font-weight:600;background:var(--panel-2);text-transform:uppercase;font-size:11px;letter-spacing:.4px}
  tbody tr:last-child td{border-bottom:none}
  tbody tr{transition:background .12s}tbody tr:hover{background:var(--panel-2)}
  .pill{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11.5px;font-weight:600}
  .pill.pago{background:var(--green-bg);color:var(--green)}.pill.pendente{background:var(--yellow-bg);color:var(--yellow)}
  .pill.atrasado{background:var(--red-bg);color:var(--red)}.pill.cancelado{background:var(--border-2);color:var(--muted)}

  .btn{background:var(--orange);color:#fff;border:none;padding:9px 15px;border-radius:10px;font-weight:600;font-size:13px;transition:all .15s;box-shadow:var(--sh-sm)}
  .btn:hover{background:var(--orange-deep)}
  .btn.sm{padding:6px 11px;font-size:12px}
  .btn.ghost{background:#fff;border:1px solid var(--border);color:var(--ink-2);box-shadow:none}
  .btn.ghost:hover{background:var(--panel-2);border-color:#d7dae0}
  .btn.green{background:var(--green)}.btn.green:hover{background:#0c854a}
  .btn.red{background:#fff;border:1px solid var(--red-bg);color:var(--red);box-shadow:none}.btn.red:hover{background:var(--red-bg)}
  .btn:disabled{opacity:.55;cursor:not-allowed}

  .overlay{position:fixed;inset:0;background:rgba(16,18,24,.35);backdrop-filter:blur(2px);z-index:50;display:flex;justify-content:flex-end}
  .drawer{position:relative;width:444px;max-width:100%;background:var(--panel);height:100%;overflow-y:auto;padding:24px;border-left:1px solid var(--border);animation:slide .26s cubic-bezier(.2,.8,.2,1);box-shadow:var(--sh-lg)}
  @keyframes slide{from{transform:translateX(28px);opacity:0}to{transform:none;opacity:1}}
  .drawer h3{font-size:19px;font-weight:800;color:var(--ink);letter-spacing:-.02em}
  .drawer .sub{color:var(--muted);font-size:12.5px;margin-top:3px}
  .field{margin:15px 0}
  .field label{display:block;font-size:12px;color:var(--muted);font-weight:600;margin-bottom:6px}
  input,select,textarea{width:100%;background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--ink);font-size:13.5px;outline:none;transition:border-color .15s,box-shadow .15s}
  input:focus,select:focus,textarea:focus{border-color:var(--orange);box-shadow:0 0 0 3px var(--orange-soft)}
  input::placeholder,textarea::placeholder{color:var(--faint)}
  .row{display:flex;gap:8px}.row>*{flex:1}
  .chat{background:var(--panel-2);border:1px solid var(--border);border-radius:12px;padding:13px;max-height:300px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
  .msg{max-width:82%;padding:9px 12px;border-radius:12px;font-size:13px;line-height:1.45;white-space:pre-wrap;word-break:break-word}
  .msg.out{align-self:flex-end;background:var(--orange);color:#fff;border-bottom-right-radius:4px}
  .msg.out .tm{color:rgba(255,255,255,.82)}
  .msg.in{align-self:flex-start;background:#fff;border:1px solid var(--border);color:var(--ink);border-bottom-left-radius:4px}
  .msg .tm{display:block;font-size:10px;color:var(--faint);margin-top:3px}
  .divider{height:1px;background:var(--border);margin:18px 0}
  .x{position:absolute;top:20px;right:24px;background:none;border:none;color:var(--faint);font-size:22px;line-height:1}.x:hover{color:var(--ink)}
  .inst{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;box-shadow:var(--sh-sm)}

  .modal{position:fixed;inset:0;background:rgba(16,18,24,.4);backdrop-filter:blur(3px);z-index:60;display:flex;align-items:center;justify-content:center;padding:20px}
  .modal .box{background:#fff;border:1px solid var(--border);border-radius:18px;padding:28px;max-width:420px;width:100%;text-align:center;position:relative;box-shadow:var(--sh-lg)}
  .qr{background:#fff;border:1px solid var(--border);border-radius:14px;padding:12px;width:258px;height:258px;margin:16px auto;display:flex;align-items:center;justify-content:center}
  .qr img{width:100%;height:100%;object-fit:contain}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 20px;border-radius:11px;z-index:80;font-weight:500;font-size:13px;box-shadow:var(--sh-lg)}

  .card-box{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:22px;box-shadow:var(--sh-sm);margin-bottom:16px}
  .card-box h4{font-size:15px;font-weight:700;color:var(--ink)}
  .card-box .desc{font-size:12.5px;color:var(--muted);margin:4px 0 16px}

  /* segmented control */
  .seg{display:inline-flex;background:var(--panel-2);border:1px solid var(--border);border-radius:10px;padding:3px;gap:2px}
  .seg button{background:transparent;border:none;color:var(--muted);font-weight:600;font-size:13px;padding:7px 14px;border-radius:8px;transition:.15s}
  .seg button.on{background:#fff;color:var(--orange-deep);box-shadow:var(--sh-sm)}

  /* message composer */
  .compose{display:grid;grid-template-columns:1fr 340px;gap:18px;align-items:start}
  @media(max-width:880px){.compose{grid-template-columns:1fr}}
  .wa-preview{background:#e7ddd3;border-radius:16px;padding:20px;min-height:300px;background-image:linear-gradient(rgba(231,221,211,.6),rgba(231,221,211,.6))}
  .wa-bubble{background:#fff;border-radius:10px;border-top-left-radius:2px;padding:8px;max-width:300px;box-shadow:0 1px 1px rgba(0,0,0,.12);font-size:13.5px;color:#111}
  .wa-bubble img{width:100%;border-radius:7px;display:block;margin-bottom:6px}
  .wa-bubble .txt{white-space:pre-wrap;word-break:break-word;line-height:1.4;padding:0 2px}
  .wa-bubble .ft{color:#667;font-size:11px;margin-top:5px;padding:0 2px}
  .wa-bubble .btns{margin-top:8px;border-top:1px solid #eef0f2;padding-top:6px;display:flex;flex-direction:column;gap:5px}
  .wa-bubble .btns .b{color:#0a7cff;text-align:center;font-weight:600;font-size:13px;padding:7px;background:#fff;border-radius:7px;border-top:1px solid #f0f2f4}
  .btn-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
  .img-thumb{width:54px;height:54px;border-radius:9px;object-fit:cover;border:1px solid var(--border)}
  .chip{display:inline-flex;align-items:center;gap:6px;background:var(--panel-2);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:12.5px;font-weight:600;color:var(--ink-2)}

  .login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100}
  .login .box{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:36px;width:352px;text-align:center;box-shadow:var(--sh-lg)}
  .login .box .p{color:var(--muted);margin-bottom:18px;font-size:13px}
  .login .brand{display:flex;align-items:center;justify-content:center;gap:10px;font-weight:800;font-size:18px;margin-bottom:10px}
  .login .brand .logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#ff8a3a,#f5521e);display:flex;align-items:center;justify-content:center}
  .login .brand .logo svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2}
  .login .brand b{color:var(--orange-deep)}
  @media(max-width:980px){.sidebar{width:72px;flex:0 0 72px}.sb-brand span:last-child,.sb-label,.sb-nav button span,.sb-user .who{display:none}.sb-nav button{justify-content:center}.sb-user{justify-content:center}}
  @media(max-width:760px){main{padding:18px}.topbar{padding:13px 18px}}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login" id="login">
  <div class="box">
    <div class="brand"><span class="logo"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="m13 2-3 9h7l-5 11 3-9H8z"/></svg></span><span>HYPER<b>FLICK</b></span></div>
    <div class="p">Painel administrativo</div>
    <input id="loginEmail" type="email" placeholder="E-mail" autocomplete="username" style="margin-bottom:10px" onkeydown="if(event.key==='Enter')doLogin()">
    <input id="loginPass" type="password" placeholder="Senha" autocomplete="current-password" style="margin-bottom:14px" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn" style="width:100%" onclick="doLogin()">Entrar</button>
    <p id="loginErr" style="color:var(--red);font-size:12px;margin-top:12px;min-height:14px"></p>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
 <div class="layout">
  <aside class="sidebar">
    <div class="sb-brand"><span class="logo"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="m13 2-3 9h7l-5 11 3-9H8z"/></svg></span><span>HYPER<b>FLICK</b></span></div>
    <div class="sb-label">Menu</div>
    <nav class="sb-nav">
      <button data-tab="overview" class="active" onclick="tab('overview')"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg><span>Visão geral</span></button>
      <button data-tab="kanban" onclick="tab('kanban')"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="5" height="16" rx="1.5"/><rect x="10" y="4" width="5" height="11" rx="1.5"/><rect x="17" y="4" width="4" height="7" rx="1.5"/></svg><span>CRM · Funil</span></button>
      <button data-tab="msgs" onclick="tab('msgs')"><svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-8.5 8.5 8.5 8.5 0 0 1-3.8-.9L3 21l1.9-5.7A8.5 8.5 0 1 1 21 11.5z"/></svg><span>Mensagens</span></button>
      <button data-tab="fin" onclick="tab('fin')"><svg viewBox="0 0 24 24"><rect x="2.5" y="6" width="19" height="13" rx="2.5"/><path d="M2.5 10h19"/></svg><span>Financeiro</span></button>
      <button data-tab="config" onclick="tab('config')"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"/><path d="M19.4 13a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-2.9 1.2V20a2 2 0 1 1-4 0v-.1A1.7 1.7 0 0 0 7 18.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1A1.7 1.7 0 0 0 5 13a1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1A1.7 1.7 0 0 0 5 6.6L4.9 6.5a2 2 0 1 1 2.8-2.8l.1.1A1.7 1.7 0 0 0 11 4.6V4a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 2.9 1.2l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1A1.7 1.7 0 0 0 21 11h.1a2 2 0 1 1 0 4H21a1.7 1.7 0 0 0-1.6 1z"/></svg><span>Configurações</span></button>
    </nav>
    <div class="sb-foot">
      <div class="sb-user">
        <div class="av" id="sbAv">H</div>
        <div class="who"><div class="em" id="sbEmail">—</div><div class="st">conta ativa</div></div>
      </div>
      <button class="out" onclick="logout()"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="m16 17 5-5-5-5"/><path d="M21 12H9"/></svg> Sair</button>
    </div>
  </aside>

  <div class="content">
    <div class="topbar">
      <div><div class="ttl" id="pageTtl">Visão geral</div><div class="sub" id="pageSub">Resumo do seu negócio</div></div>
      <div class="wa-status" id="waStatus"><span class="dot"></span> verificando...</div>
    </div>
    <main>
      <section id="overview"></section>
      <section id="kanban" class="hidden"></section>
      <section id="msgs" class="hidden"></section>
      <section id="fin" class="hidden"></section>
      <section id="config" class="hidden"></section>
    </main>
  </div>
 </div>
</div>

<div id="drawerRoot"></div>
<div id="modalRoot"></div>
<div id="toastRoot"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ===================== AUTH (Supabase) ===================== */
let supa = null, PRICES = { mensal: 19.9, semestral: 79.9, anual: 129.9 };
async function initSupa() {
  if (supa) return supa;
  const cfg = await fetch('/api/config').then(r => r.json()).catch(() => ({}));
  if (cfg.prices) PRICES = cfg.prices;
  if (cfg.supabaseUrl && cfg.supabaseAnonKey && window.supabase) supa = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);
  return supa;
}
async function accessToken() { if (!supa) return ''; const { data } = await supa.auth.getSession(); return data?.session?.access_token || ''; }

/* ===================== API ===================== */
async function api(path, opts = {}) {
  const token = await accessToken();
  const res = await fetch('/api' + path, { ...opts, headers: { 'Content-Type': 'application/json', ...(token ? { Authorization: 'Bearer ' + token } : {}), ...(opts.headers || {}) } });
  if (res.status === 401) { logout(); throw new Error('Não autorizado'); }
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || ('Erro ' + res.status));
  return data;
}
function toast(msg) { const r = document.getElementById('toastRoot'); r.innerHTML = `<div class="toast">${msg}</div>`; setTimeout(() => (r.innerHTML = ''), 3200); }
const money = (v) => 'R$ ' + (Number(v) || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtDate = (d) => d ? new Date(d).toLocaleDateString('pt-BR') : '—';
const fmtDT = (d) => d ? new Date(d).toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' }) : '';
const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
function planPrice(plan) { const p = String(plan || '').toLowerCase(); if (p.includes('semes')) return PRICES.semestral; if (p.includes('anu')) return PRICES.anual; return PRICES.mensal; }

/* ===================== LOGIN ===================== */
function enterApp() {
  document.getElementById('login').classList.add('hidden'); document.getElementById('app').classList.remove('hidden');
  supa?.auth.getUser().then(({ data }) => { const em = data?.user?.email || ''; document.getElementById('sbEmail').textContent = em; document.getElementById('sbAv').textContent = (em[0] || 'H').toUpperCase(); }).catch(() => {});
  boot();
}
async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginErr'); errEl.textContent = '';
  await initSupa();
  if (!supa) { errEl.textContent = 'Supabase não configurado no servidor.'; return; }
  const { error } = await supa.auth.signInWithPassword({ email, password });
  if (error) { errEl.textContent = 'E-mail ou senha incorretos.'; return; }
  enterApp();
}
async function logout() { if (supa) await supa.auth.signOut(); location.reload(); }

/* ===================== TABS ===================== */
const TITLES = {
  overview: ['Visão geral', 'Resumo do seu negócio'],
  kanban: ['CRM · Funil', 'Arraste os leads entre as etapas'],
  msgs: ['Mensagens', 'Crie e dispare mensagens com imagem e botões'],
  fin: ['Financeiro', 'Cobranças, despesas e relatórios'],
  config: ['Configurações', 'WhatsApp e notificações'],
};
function tab(name) {
  ['overview', 'kanban', 'msgs', 'fin', 'config'].forEach(t => {
    document.getElementById(t).classList.toggle('hidden', t !== name);
    document.querySelector(`.sb-nav button[data-tab="${t}"]`).classList.toggle('active', t === name);
  });
  const [t, s] = TITLES[name]; document.getElementById('pageTtl').textContent = t; document.getElementById('pageSub').textContent = s;
  if (name === 'overview') loadOverview();
  if (name === 'kanban') loadKanban();
  if (name === 'msgs') loadMsgs();
  if (name === 'fin') loadFin();
  if (name === 'config') loadConfig();
}

/* ===================== OVERVIEW (dashboard) ===================== */
async function loadOverview() {
  const s = await api('/payments/summary/all');
  const f = s.financeiro;
  const maxF = Math.max(1, ...Object.values(s.funil));
  const FUN = [['lead', 'Leads', '#9aa0ac'], ['testando', 'Testando', '#f5611e'], ['ganho', 'Ganhos', '#0f9d58'], ['perdido', 'Perdidos', '#e5484d'], ['followup', 'Follow-up', '#b7791f']];
  document.getElementById('overview').innerHTML = `
    <div class="gcards">
      <div class="gcard g-dark"><div class="lbl">Total de leads</div><div class="val">${s.totalLeads}</div><div class="sub">Conversão de ${s.conversao}%</div></div>
      <div class="gcard g-purple"><div class="lbl">MRR estimado</div><div class="val">${money(s.mrr)}</div><div class="sub">Receita recorrente / mês</div></div>
      <div class="gcard g-green"><div class="lbl">Recebido</div><div class="val">${money(f.recebido)}</div><div class="sub">${f.pagos} pagamentos</div></div>
      <div class="gcard g-red"><div class="lbl">Lucro (sobra)</div><div class="val">${money(f.lucro)}</div><div class="sub">Recebido − despesas</div></div>
    </div>
    <div class="grid-stats">
      <div class="stat"><div class="lbl">A receber</div><div class="val yellow">${money(f.pendente)}</div></div>
      <div class="stat"><div class="lbl">Atrasado</div><div class="val red">${money(f.atrasado)}</div></div>
      <div class="stat"><div class="lbl">Despesas</div><div class="val red">${money(f.despesas)}</div></div>
    </div>
    <div class="section-h">Funil de vendas</div>
    <div class="funnel">
      ${FUN.map(([k, l, c]) => `<div class="row-f"><span class="nm">${l}</span><div class="bar"><i style="width:${Math.round((s.funil[k] / maxF) * 100)}%;background:${c}"></i></div><span class="ct">${s.funil[k]}</span></div>`).join('')}
    </div>`;
}

/* ===================== KANBAN ===================== */
const STAGES = [
  { id: 'lead', label: 'Lead', color: '#9aa0ac' },
  { id: 'testando', label: 'Testando', color: '#f5611e' },
  { id: 'ganho', label: 'Ganho', color: '#0f9d58' },
  { id: 'perdido', label: 'Perdido', color: '#e5484d' },
  { id: 'followup', label: 'Follow-up', color: '#b7791f' },
];
let LEADS = [];
async function loadKanban() { LEADS = await api('/leads'); renderBoard(); }
function dealValue(l) { return planPrice(l.plan); }
function renderBoard() {
  const now = Date.now();
  const sumStage = (id) => LEADS.filter(l => l.stage === id).reduce((s, l) => s + dealValue(l), 0);
  const totalAll = LEADS.reduce((s, l) => s + dealValue(l), 0);
  const nego = sumStage('testando') + sumStage('followup');
  const board = `<div class="board">${STAGES.map(st => {
    const items = LEADS.filter(l => l.stage === st.id);
    const sum = items.reduce((s, l) => s + dealValue(l), 0);
    return `<div class="col" data-stage="${st.id}" ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')" ondrop="dropLead(event,'${st.id}')">
      <div class="col-top" style="background:${st.color}"></div>
      <div class="col-h"><span class="lft">${esc(st.label)}</span><span class="count">${items.length}</span></div>
      <div class="col-sum" style="color:${st.color}">${money(sum)}</div>
      <div class="col-body">
      ${items.map(l => {
        let exp = '';
        if (l.test_expires_at) { const left = new Date(l.test_expires_at).getTime() - now; exp = left > 0 ? `<span class="tag warn">${Math.ceil(left / 3600000)}h</span>` : `<span class="tag exp">expirado</span>`; }
        return `<div class="lead-card" draggable="true" ondragstart="dragLead(event,'${l.id}')" onclick="openLead('${l.id}')">
          <div class="nm">${esc(l.name)}</div>
          <div class="ph"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>${esc(l.phone)}</div>
          <div class="foot"><span class="dv">${money(dealValue(l))}</span><span>${l.plan ? `<span class="tag plain">${esc(l.plan)}</span>` : ''}${exp}</span></div>
        </div>`;
      }).join('') || '<div style="color:var(--faint);font-size:12px;text-align:center;padding:14px 0">Vazio</div>'}
      </div>
    </div>`;
  }).join('')}</div>`;
  document.getElementById('kanban').innerHTML = `
    <div class="gcards">
      <div class="gcard g-dark"><div class="lbl">Total do funil</div><div class="val">${money(totalAll)}</div><div class="sub">${LEADS.length} negócios</div></div>
      <div class="gcard g-purple"><div class="lbl">Em negociação</div><div class="val">${money(nego)}</div><div class="sub">Testando + follow-up</div></div>
      <div class="gcard g-green"><div class="lbl">Fechado (ganho)</div><div class="val">${money(sumStage('ganho'))}</div><div class="sub">${LEADS.filter(l => l.stage === 'ganho').length} ganhos</div></div>
      <div class="gcard g-red"><div class="lbl">Perdido</div><div class="val">${money(sumStage('perdido'))}</div><div class="sub">${LEADS.filter(l => l.stage === 'perdido').length} perdidos</div></div>
    </div>
    ${board}`;
}
let dragId = null;
function dragLead(e, id) { dragId = id; e.dataTransfer.effectAllowed = 'move'; }
async function dropLead(e, stage) {
  e.preventDefault();
  document.querySelectorAll('.col').forEach(c => c.classList.remove('drag'));
  if (!dragId) return;
  const lead = LEADS.find(l => l.id === dragId);
  if (!lead || lead.stage === stage) return;
  lead.stage = stage; renderBoard();
  try {
    if (stage === 'ganho') await api('/leads/' + dragId + '/won', { method: 'POST', body: JSON.stringify({}) });
    else await api('/leads/' + dragId, { method: 'PATCH', body: JSON.stringify({ stage }) });
    toast('Lead movido para ' + stage);
  } catch (err) { toast('Erro: ' + err.message); loadKanban(); }
  dragId = null;
}

/* ===================== DRAWER + AUTO-REFRESH ===================== */
let chatPoll = null, currentLeadId = null;
function chatHtml(msgs) {
  return (msgs || []).map(m => `<div class="msg ${m.direction}">${esc(m.body)}<span class="tm">${fmtDT(m.created_at)}${m.status === 'failed' ? ' · falhou' : ''}</span></div>`).join('')
    || '<p style="color:var(--muted);font-size:13px">Sem mensagens ainda.</p>';
}
async function openLead(id) {
  const l = await api('/leads/' + id);
  const pays = (l.payments || []).map(p => `<div style="display:flex;justify-content:space-between;font-size:13px;padding:5px 0"><span>${money(p.amount)} · ${esc(p.plan || '')}</span><span class="pill ${p.status}">${p.status}</span></div>`).join('') || '<p style="color:var(--muted);font-size:13px">Nenhuma cobrança.</p>';
  document.getElementById('drawerRoot').innerHTML = `
   <div class="overlay" onclick="if(event.target===this)closeDrawer()">
    <div class="drawer">
      <button class="x" onclick="closeDrawer()">×</button>
      <h3>${esc(l.name)}</h3>
      <div class="sub">${esc(l.phone)} · ${esc(l.plan || 'sem plano')} · ${esc(l.stage)}${l.app ? ' · ' + esc(l.app) : ''}</div>
      ${l.test_username ? `<div class="field"><label>Acesso de teste</label>
        <div class="inst" style="flex-direction:column;align-items:flex-start;gap:5px">
          <span>Usuário: <b>${esc(l.test_username)}</b></span>
          <span>Senha: <b>${esc(l.test_password)}</b></span>
          ${l.app ? `<span style="color:var(--muted);font-size:12px">App instalado: ${esc(l.app)}</span>` : ''}
        </div></div>` : ''}
      <div class="field"><label>Etapa</label>
        <select id="dStage" onchange="changeStage('${l.id}',this.value)">
          ${STAGES.map(s => `<option value="${s.id}" ${s.id === l.stage ? 'selected' : ''}>${s.label}</option>`).join('')}
        </select>
      </div>
      <div class="row"><button class="btn sm ghost" onclick="genTest('${l.id}')">Gerar teste</button><button class="btn sm green" onclick="markWon('${l.id}')">Marcar ganho</button></div>
      <div class="row" style="margin-top:8px"><button class="btn sm" onclick="genPix('${l.id}')">Enviar Pix · ${esc(l.plan || 'plano')}</button></div>
      <div class="divider"></div>
      <label style="font-size:12px;color:var(--muted);font-weight:600">Conversa (WhatsApp)</label>
      <div class="chat" id="chatBox" style="margin-top:6px">${chatHtml(l.messages)}</div>
      <div class="row"><input id="dMsg" placeholder="Escreva uma mensagem..." onkeydown="if(event.key==='Enter')sendMsg('${l.id}')"><button class="btn sm" style="flex:0 0 auto" onclick="sendMsg('${l.id}')">Enviar</button></div>
      <div class="divider"></div>
      <label style="font-size:12px;color:var(--muted);font-weight:600">Cobranças</label>
      <div style="margin:6px 0">${pays}</div>
      <div class="field"><label>Anotações</label>
        <textarea id="dNotes" rows="3" placeholder="Observações internas...">${esc(l.notes || '')}</textarea>
        <button class="btn sm ghost" style="margin-top:8px" onclick="saveNotes('${l.id}')">Salvar nota</button>
      </div>
      <div class="divider"></div>
      <button class="btn red sm" onclick="delLead('${l.id}')">Excluir lead</button>
    </div>
   </div>`;
  const cb = document.getElementById('chatBox'); if (cb) cb.scrollTop = cb.scrollHeight;
  currentLeadId = id; clearInterval(chatPoll); chatPoll = setInterval(() => refreshChat(id), 5000);
}
async function refreshChat(id) {
  if (currentLeadId !== id) return;
  try {
    const l = await api('/leads/' + id);
    const box = document.getElementById('chatBox');
    if (box) { const atBottom = box.scrollTop + box.clientHeight >= box.scrollHeight - 30; box.innerHTML = chatHtml(l.messages); if (atBottom) box.scrollTop = box.scrollHeight; }
  } catch (e) { }
}
function closeDrawer() { clearInterval(chatPoll); currentLeadId = null; document.getElementById('drawerRoot').innerHTML = ''; }
async function changeStage(id, stage) {
  try {
    if (stage === 'ganho') await api('/leads/' + id + '/won', { method: 'POST', body: JSON.stringify({}) });
    else await api('/leads/' + id, { method: 'PATCH', body: JSON.stringify({ stage }) });
    toast('Etapa atualizada'); loadKanban();
  } catch (e) { toast('Erro: ' + e.message); }
}
async function genTest(id) {
  toast('Gerando teste...');
  try { const r = await api('/leads/' + id + '/test', { method: 'POST', body: JSON.stringify({}) }); toast(r.whatsappSent ? 'Teste enviado no WhatsApp' : 'Teste gerado (WhatsApp: ' + (r.whatsappError || 'não enviado') + ')'); openLead(id); loadKanban(); }
  catch (e) { toast('Erro: ' + e.message); }
}
async function markWon(id) { try { await api('/leads/' + id + '/won', { method: 'POST', body: JSON.stringify({}) }); toast('Marcado como ganho'); openLead(id); loadKanban(); } catch (e) { toast('Erro: ' + e.message); } }
async function genPix(id) { toast('Gerando Pix...'); try { const r = await api('/leads/' + id + '/pix', { method: 'POST', body: JSON.stringify({}) }); toast('Pix enviado · ' + (r.plan || '') + ' ' + money(r.amount)); openLead(id); } catch (e) { toast('Erro: ' + e.message); } }
async function sendMsg(id) {
  const input = document.getElementById('dMsg'); const text = input.value.trim();
  if (!text) return; input.value = '';
  try { await api('/leads/' + id + '/message', { method: 'POST', body: JSON.stringify({ text }) }); refreshChat(id); }
  catch (e) { toast('Erro: ' + e.message); input.value = text; }
}
async function saveNotes(id) { const notes = document.getElementById('dNotes').value; try { await api('/leads/' + id, { method: 'PATCH', body: JSON.stringify({ notes }) }); toast('Nota salva'); } catch (e) { toast('Erro: ' + e.message); } }
async function delLead(id) { if (!confirm('Excluir este lead?')) return; try { await api('/leads/' + id, { method: 'DELETE' }); toast('Lead excluído'); closeDrawer(); loadKanban(); } catch (e) { toast('Erro: ' + e.message); } }

/* ===================== MENSAGENS (disparo manual) ===================== */
let MSG = { image: '', buttons: [], target: 'numero', stageCounts: {} };
async function loadMsgs() {
  // contagem por etapa para o seletor de destinatários
  try { const leads = await api('/leads'); MSG.stageCounts = {}; for (const l of leads) MSG.stageCounts[l.stage] = (MSG.stageCounts[l.stage] || 0) + 1; MSG.total = leads.length; }
  catch (e) { MSG.stageCounts = {}; MSG.total = 0; }
  renderMsgs();
}
function renderMsgs() {
  const sc = MSG.stageCounts || {};
  document.getElementById('msgs').innerHTML = `
  <div class="compose">
    <div>
      <div class="card-box" style="margin-bottom:16px">
        <h4>Destinatários</h4>
        <div class="desc">Para quem enviar essa mensagem.</div>
        <div class="seg" style="margin-bottom:12px">
          <button class="${MSG.target === 'numero' ? 'on' : ''}" onclick="setTarget('numero')">Número avulso</button>
          <button class="${MSG.target === 'stage' ? 'on' : ''}" onclick="setTarget('stage')">Por etapa</button>
          <button class="${MSG.target === 'todos' ? 'on' : ''}" onclick="setTarget('todos')">Todos os leads</button>
        </div>
        <div id="targetBody">${targetBody()}</div>
      </div>
      <div class="card-box">
        <h4>Mensagem</h4>
        <div class="desc">Texto, imagem e até 3 botões.</div>
        <div class="field"><label>Texto</label><textarea id="msgText" rows="5" placeholder="Escreva sua mensagem... (use *negrito* do WhatsApp)" oninput="renderMsgPreview()"></textarea></div>
        <div class="field"><label>Imagem (opcional)</label>
          <div class="btn-row">
            ${MSG.image ? `<img class="img-thumb" src="${MSG.image}"><button class="btn sm red" onclick="clearImg()">Remover</button>` : `
            <label class="btn sm ghost" style="display:inline-flex">Enviar arquivo<input type="file" accept="image/*" class="hidden" onchange="onImgFile(this)"></label>
            <span style="color:var(--faint);font-size:12px">ou cole uma URL abaixo</span>`}
          </div>
          ${MSG.image ? '' : `<input id="msgImgUrl" placeholder="https://.../imagem.jpg" oninput="onImgUrl(this.value)">`}
        </div>
        <div class="field"><label>Botões (resposta rápida) — máx. 3</label>
          <div id="btnList">${btnList()}</div>
          ${MSG.buttons.length < 3 ? `<button class="btn sm ghost" style="margin-top:8px" onclick="addBtn()">+ Adicionar botão</button>` : ''}
        </div>
        <div class="field"><label>Rodapé (opcional)</label><input id="msgFooter" placeholder="Ex.: HyperFlick • IPTV" oninput="renderMsgPreview()"></div>
        <button class="btn" id="msgSend" onclick="dispatchMsg()" style="width:100%;margin-top:6px">Disparar mensagem</button>
        <div id="msgResult" style="margin-top:12px"></div>
      </div>
    </div>
    <div>
      <div class="section-h">Pré-visualização</div>
      <div class="wa-preview"><div class="wa-bubble" id="waBubble"></div></div>
    </div>
  </div>`;
  renderMsgPreview();
}
function targetBody() {
  const sc = MSG.stageCounts || {};
  if (MSG.target === 'numero') return `<input id="tgNumber" placeholder="WhatsApp com DDD (ex.: 11999998888)">`;
  if (MSG.target === 'stage') return `<select id="tgStage">${STAGES.map(s => `<option value="${s.id}">${s.label} (${sc[s.id] || 0})</option>`).join('')}</select>`;
  return `<div class="chip">Enviar para todos os ${MSG.total || 0} leads com WhatsApp</div>`;
}
function setTarget(t) { MSG.target = t; document.querySelectorAll('#msgs .seg button').forEach(b => b.classList.remove('on')); event.target.classList.add('on'); document.getElementById('targetBody').innerHTML = targetBody(); }
function btnList() {
  return MSG.buttons.map((b, i) => `<div class="btn-row"><input value="${esc(b.text)}" placeholder="Texto do botão ${i + 1}" oninput="MSG.buttons[${i}].text=this.value;renderMsgPreview()"><button class="btn sm red" onclick="rmBtn(${i})">×</button></div>`).join('') || '';
}
function addBtn() { if (MSG.buttons.length >= 3) return; MSG.buttons.push({ text: '' }); document.getElementById('btnList').innerHTML = btnList(); renderMsgsButtonsArea(); }
function rmBtn(i) { MSG.buttons.splice(i, 1); document.getElementById('btnList').innerHTML = btnList(); renderMsgsButtonsArea(); renderMsgPreview(); }
function renderMsgsButtonsArea() { // re-render só a área de botões (para mostrar/ocultar o "+")
  const wrap = document.getElementById('btnList').parentElement;
  const addExisting = wrap.querySelector('button.ghost');
  if (MSG.buttons.length < 3 && !addExisting) { const b = document.createElement('button'); b.className = 'btn sm ghost'; b.style.marginTop = '8px'; b.textContent = '+ Adicionar botão'; b.onclick = addBtn; wrap.appendChild(b); }
  if (MSG.buttons.length >= 3 && addExisting) addExisting.remove();
  renderMsgPreview();
}
function onImgFile(input) { const f = input.files[0]; if (!f) return; const rd = new FileReader(); rd.onload = () => { MSG.image = rd.result; renderMsgs(); }; rd.readAsDataURL(f); }
function onImgUrl(v) { MSG.image = v.trim(); renderMsgPreview(); }
function clearImg() { MSG.image = ''; renderMsgs(); }
function renderMsgPreview() {
  const text = document.getElementById('msgText')?.value || '';
  const footer = document.getElementById('msgFooter')?.value || '';
  const wa = (s) => esc(s).replace(/\*(.+?)\*/g, '<b>$1</b>').replace(/_(.+?)_/g, '<i>$1</i>');
  const btns = MSG.buttons.filter(b => b.text.trim());
  document.getElementById('waBubble').innerHTML = `
    ${MSG.image ? `<img src="${esc(MSG.image)}" onerror="this.style.display='none'">` : ''}
    <div class="txt">${wa(text) || '<span style="color:#999">Sua mensagem aparece aqui…</span>'}</div>
    ${footer ? `<div class="ft">${esc(footer)}</div>` : ''}
    ${btns.length ? `<div class="btns">${btns.map(b => `<div class="b">${esc(b.text)}</div>`).join('')}</div>` : ''}`;
}
async function dispatchMsg() {
  const text = document.getElementById('msgText').value.trim();
  const footer = document.getElementById('msgFooter').value.trim();
  const buttons = MSG.buttons.filter(b => b.text.trim());
  if (!text && !MSG.image) { toast('Escreva um texto ou anexe uma imagem.'); return; }
  const payload = { text, footer, buttons, image: MSG.image || '' };
  if (MSG.target === 'numero') { const n = document.getElementById('tgNumber').value.trim(); if (!n) { toast('Informe o número.'); return; } payload.recipients = [{ phone: n }]; }
  else if (MSG.target === 'stage') { payload.stage = document.getElementById('tgStage').value; }
  else { payload.allLeads = true; }

  const btn = document.getElementById('msgSend'); btn.disabled = true; btn.textContent = 'Enviando...';
  const res = document.getElementById('msgResult');
  try {
    const r = await api('/messages/send', { method: 'POST', body: JSON.stringify(payload) });
    res.innerHTML = `<div class="chip" style="color:var(--green);border-color:var(--green-bg);background:var(--green-bg)">✓ ${r.sent} enviada(s)${r.failed ? ` · ${r.failed} falha(s)` : ''} de ${r.total}</div>`;
    toast(`Disparo concluído: ${r.sent}/${r.total}`);
  } catch (e) { res.innerHTML = `<div class="chip" style="color:var(--red);border-color:var(--red-bg);background:var(--red-bg)">${esc(e.message)}</div>`; }
  finally { btn.disabled = false; btn.textContent = 'Disparar mensagem'; }
}

/* ===================== FINANCEIRO ===================== */
let finSub = 'resumo';
function loadFin() {
  document.getElementById('fin').innerHTML = `
    <div class="seg" style="margin-bottom:20px">
      ${[['resumo', 'Resumo'], ['cobrancas', 'Cobranças'], ['despesas', 'Despesas'], ['relatorios', 'Relatórios']].map(([k, l]) => `<button data-fs="${k}" class="${finSub === k ? 'on' : ''}" onclick="finTab('${k}')">${l}</button>`).join('')}
    </div>
    <div id="finBody"></div>`;
  finTab(finSub);
}
function finTab(t) {
  finSub = t;
  document.querySelectorAll('#fin [data-fs]').forEach(b => b.classList.toggle('on', b.dataset.fs === t));
  ({ resumo: finResumo, cobrancas: finCobrancas, despesas: finDespesas, relatorios: finRelatorios }[t])();
}
async function finResumo() {
  const s = await api('/payments/summary/all'); const f = s.financeiro;
  document.getElementById('finBody').innerHTML = `<div class="gcards">
      <div class="gcard g-green"><div class="lbl">Recebido</div><div class="val">${money(f.recebido)}</div><div class="sub">${f.pagos} pagamentos</div></div>
      <div class="gcard g-orange"><div class="lbl">A receber</div><div class="val">${money(f.pendente)}</div><div class="sub">${f.emAberto} em aberto</div></div>
      <div class="gcard g-red"><div class="lbl">Atrasado + despesas</div><div class="val">${money(f.atrasado + f.despesas)}</div><div class="sub">Atrasado ${money(f.atrasado)}</div></div>
      <div class="gcard g-dark"><div class="lbl">Lucro (sobra)</div><div class="val">${money(f.lucro)}</div><div class="sub">MRR ${money(s.mrr)}</div></div>
    </div>`;
}
async function finCobrancas() {
  const rows = await api('/payments');
  document.getElementById('finBody').innerHTML = `
    <div class="card-box">
      <h4>Adicionar cobrança / cliente</h4>
      <div class="row" style="flex-wrap:wrap;gap:8px;margin-top:12px">
        <input id="mcName" placeholder="Nome do cliente" style="flex:2;min-width:140px">
        <input id="mcPhone" placeholder="WhatsApp (DDD)" style="flex:1;min-width:120px">
        <input id="mcPlan" placeholder="Plano / descrição" style="flex:1;min-width:120px">
        <input id="mcAmount" type="number" step="0.01" placeholder="Valor" style="flex:1;min-width:90px">
        <input id="mcDue" type="date" style="flex:1;min-width:130px">
        <button class="btn" style="flex:0 0 auto" onclick="addCharge()">Adicionar</button>
      </div>
    </div>
    <table>
      <thead><tr><th>Cliente</th><th>Plano</th><th>Valor</th><th>Vencimento</th><th>Status</th><th></th></tr></thead>
      <tbody>${rows.length ? rows.map(p => `<tr>
          <td><b style="color:var(--ink)">${esc(p.lead?.name || '—')}</b><div style="color:var(--faint);font-size:12px">${esc(p.lead?.phone || '')}</div></td>
          <td>${esc(p.plan || '')}</td><td>${money(p.amount)}</td><td>${fmtDate(p.due_date)}</td>
          <td><span class="pill ${p.status}">${p.status}</span></td>
          <td style="text-align:right;white-space:nowrap">${p.status !== 'pago' ? `<button class="btn sm" onclick="payPix('${p.id}')">Pix</button> <button class="btn sm green" onclick="payMark('${p.id}','pago')">Pago</button>` : `<button class="btn sm ghost" onclick="payMark('${p.id}','pendente')">Reabrir</button>`} <button class="btn sm red" onclick="delCharge('${p.id}')">Excluir</button></td>
        </tr>`).join('') : '<tr><td colspan="6" style="color:var(--muted)">Nenhuma cobrança ainda.</td></tr>'}</tbody>
    </table>`;
}
async function addCharge() {
  const name = document.getElementById('mcName').value.trim(); const amount = document.getElementById('mcAmount').value;
  if (!name || !amount) { toast('Informe nome e valor.'); return; }
  try { await api('/payments/manual', { method: 'POST', body: JSON.stringify({ name, phone: document.getElementById('mcPhone').value, plan: document.getElementById('mcPlan').value, amount, due_date: document.getElementById('mcDue').value || undefined }) }); toast('Cobrança adicionada'); finCobrancas(); }
  catch (e) { toast('Erro: ' + e.message); }
}
async function payMark(id, status) { try { await api('/payments/' + id, { method: 'PATCH', body: JSON.stringify({ status }) }); toast('Atualizado'); finCobrancas(); } catch (e) { toast('Erro: ' + e.message); } }
async function payPix(id) { toast('Gerando Pix...'); try { const r = await api('/payments/' + id + '/pix', { method: 'POST', body: JSON.stringify({}) }); toast(r.whatsappSent ? 'Pix enviado no WhatsApp' : 'Pix gerado'); } catch (e) { toast('Erro: ' + e.message); } }
async function delCharge(id) { if (!confirm('Excluir esta cobrança?')) return; try { await api('/payments/' + id, { method: 'DELETE' }); toast('Cobrança excluída'); finCobrancas(); } catch (e) { toast('Erro: ' + e.message); } }
async function finDespesas() {
  const rows = await api('/expenses'); const total = rows.reduce((s, e) => s + Number(e.amount), 0);
  document.getElementById('finBody').innerHTML = `
    <div class="card-box">
      <h4>Adicionar despesa</h4>
      <div class="row" style="flex-wrap:wrap;gap:8px;margin-top:12px">
        <input id="exDesc" placeholder="Descrição" style="flex:2;min-width:160px">
        <input id="exCat" placeholder="Categoria (painel, ads...)" style="flex:1;min-width:120px">
        <input id="exAmount" type="number" step="0.01" placeholder="Valor" style="flex:1;min-width:90px">
        <input id="exDate" type="date" style="flex:1;min-width:130px">
        <button class="btn" style="flex:0 0 auto" onclick="addExpense()">Adicionar</button>
      </div>
    </div>
    <div class="section-h">Despesas — total ${money(total)}</div>
    <table>
      <thead><tr><th>Descrição</th><th>Categoria</th><th>Valor</th><th>Data</th><th>Status</th><th></th></tr></thead>
      <tbody>${rows.length ? rows.map(e => `<tr>
        <td>${esc(e.description)}</td><td>${esc(e.category || '—')}</td><td>${money(e.amount)}</td><td>${fmtDate(e.date)}</td>
        <td><span class="pill ${e.status === 'pago' ? 'pago' : 'pendente'}">${e.status || 'pendente'}</span></td>
        <td style="text-align:right;white-space:nowrap">
          ${e.status !== 'pago' ? `<button class="btn sm green" onclick="payExpense('${e.id}')">Pagar</button>` : `<button class="btn sm ghost" onclick="reopenExpense('${e.id}')">Reabrir</button>`}
          <button class="btn sm ghost" onclick="nextExpense('${e.id}')">Próximo mês</button>
          <button class="btn sm red" onclick="delExpense('${e.id}')">Excluir</button>
        </td></tr>`).join('') : '<tr><td colspan="6" style="color:var(--muted)">Nenhuma despesa.</td></tr>'}</tbody>
    </table>`;
}
async function payExpense(id) { try { await api('/expenses/' + id, { method: 'PATCH', body: JSON.stringify({ status: 'pago' }) }); toast('Despesa paga'); finDespesas(); } catch (e) { toast('Erro: ' + e.message); } }
async function reopenExpense(id) { try { await api('/expenses/' + id, { method: 'PATCH', body: JSON.stringify({ status: 'pendente' }) }); finDespesas(); } catch (e) { toast('Erro: ' + e.message); } }
async function nextExpense(id) { try { await api('/expenses/' + id + '/next', { method: 'POST', body: JSON.stringify({}) }); toast('Despesa criada para o próximo mês'); finDespesas(); } catch (e) { toast('Erro: ' + e.message); } }
async function addExpense() {
  const description = document.getElementById('exDesc').value.trim(); const amount = document.getElementById('exAmount').value;
  if (!description || !amount) { toast('Informe descrição e valor.'); return; }
  try { await api('/expenses', { method: 'POST', body: JSON.stringify({ description, category: document.getElementById('exCat').value, amount, date: document.getElementById('exDate').value || undefined }) }); toast('Despesa adicionada'); finDespesas(); }
  catch (e) { toast('Erro: ' + e.message); }
}
async function delExpense(id) { if (!confirm('Excluir despesa?')) return; try { await api('/expenses/' + id, { method: 'DELETE' }); finDespesas(); } catch (e) { toast('Erro: ' + e.message); } }
async function finRelatorios() {
  const month = (window._repMonth || new Date().toISOString().slice(0, 7));
  const r = await api('/payments/reports/monthly?month=' + month); const cats = Object.entries(r.porCategoria || {});
  document.getElementById('finBody').innerHTML = `
    <div class="row" style="align-items:center;gap:10px;margin-bottom:18px"><label style="color:var(--muted);font-size:13px;flex:0 0 auto">Mês:</label><input type="month" value="${month}" onchange="window._repMonth=this.value;finRelatorios()" style="max-width:200px"></div>
    <div class="grid-stats">
      <div class="stat"><div class="lbl">Receita recebida</div><div class="val green">${money(r.receita)}</div></div>
      <div class="stat"><div class="lbl">Despesas</div><div class="val red">${money(r.despesas)}</div></div>
      <div class="stat"><div class="lbl">Sobra (lucro)</div><div class="val ${r.sobra >= 0 ? 'green' : 'red'}">${money(r.sobra)}</div></div>
    </div>
    <div class="section-h">Despesas por categoria</div>
    <table><thead><tr><th>Categoria</th><th>Valor</th></tr></thead>
      <tbody>${cats.length ? cats.map(([c, v]) => `<tr><td>${esc(c)}</td><td>${money(v)}</td></tr>`).join('') : '<tr><td colspan="2" style="color:var(--muted)">Sem despesas no mês.</td></tr>'}</tbody></table>`;
}

/* ===================== CONFIGURAÇÕES ===================== */
async function loadConfig() {
  const [list, cfg] = await Promise.all([api('/instances'), api('/settings').catch(() => ({}))]);
  const adminPhone = cfg.settings?.admin_phone?.phone || '';
  document.getElementById('config').innerHTML = `
    <div class="card-box">
      <h4>WhatsApp</h4>
      <div class="desc">Conecte o número que envia testes e cobranças aos clientes.</div>
      ${list.map(i => instRow(i)).join('') || '<p style="color:var(--muted);font-size:13px">Nenhuma instância. Crie uma para conectar.</p>'}
      <button class="btn" style="margin-top:8px" onclick="newInst()">Nova instância</button>
    </div>
    <div class="card-box">
      <h4>Notificações de venda</h4>
      <div class="desc">Número que recebe um aviso no WhatsApp a cada venda paga.</div>
      <div class="row" style="max-width:440px"><input id="adminPhone" placeholder="WhatsApp admin (com DDD)" value="${esc(adminPhone)}"><button class="btn" style="flex:0 0 auto" onclick="saveAdminPhone()">Salvar</button></div>
    </div>`;
  refreshWaStatus();
}
function instRow(i) {
  const st = i.status === 'connected' ? 'pago' : i.status === 'connecting' ? 'pendente' : 'atrasado';
  return `<div class="inst">
      <div><b style="color:var(--ink)">${esc(i.name)}</b> ${i.is_default ? '<span class="tag plain">padrão</span>' : ''}
        <div style="color:var(--muted);font-size:12px;margin-top:2px">${i.phone ? esc(i.phone) + ' · ' : ''}<span class="pill ${st}">${i.status}</span></div></div>
      <div class="row" style="flex:0 0 auto;gap:6px">
        ${i.status !== 'connected' ? `<button class="btn sm" onclick="connectInst('${i.id}')">Conectar</button>` : `<button class="btn sm ghost" onclick="discInst('${i.id}')">Desconectar</button>`}
        ${!i.is_default ? `<button class="btn sm ghost" onclick="defInst('${i.id}')">Padrão</button>` : ''}
        <button class="btn sm ghost" onclick="reWebhook('${i.id}')" title="Aponta o webhook para a URL pública">Webhook</button>
        <button class="btn sm red" onclick="delInst('${i.id}')">Excluir</button>
      </div></div>`;
}
async function saveAdminPhone() {
  const phone = document.getElementById('adminPhone').value.trim();
  try { await api('/settings/admin_phone', { method: 'PUT', body: JSON.stringify({ value: { phone } }) }); toast('Número admin salvo'); }
  catch (e) { toast('Erro: ' + e.message); }
}
async function newInst() {
  const name = prompt('Nome da instância:', 'hyperflick'); if (!name) return;
  toast('Criando instância...');
  try { await api('/instances', { method: 'POST', body: JSON.stringify({ name }) }); loadConfig(); } catch (e) { toast('Erro: ' + e.message); }
}
let qrPoll = null;
async function connectInst(id) { try { const r = await api('/instances/' + id + '/connect', { method: 'POST', body: JSON.stringify({}) }); showQr(id, r.qrcode, r.paircode); } catch (e) { toast('Erro: ' + e.message); } }
function qrSrc(qr) { if (!qr) return ''; if (typeof qr === 'object') qr = qr.base64 || ''; return qr.startsWith('data:') ? qr : 'data:image/png;base64,' + qr; }
function showQr(id, qr, paircode) {
  document.getElementById('modalRoot').innerHTML = `
    <div class="modal" onclick="if(event.target===this)closeModal()">
      <div class="box"><button class="x" onclick="closeModal()">×</button>
        <h3 style="font-size:18px;color:var(--ink)">Conectar WhatsApp</h3>
        <p style="color:var(--muted);font-size:13px;margin-top:6px">WhatsApp → Aparelhos conectados → Conectar aparelho</p>
        <div class="qr">${qr ? `<img src="${qrSrc(qr)}">` : '<span style="color:#999">gerando QR...</span>'}</div>
        ${paircode ? `<p>ou use o código: <b style="font-size:18px;letter-spacing:2px">${esc(paircode)}</b></p>` : ''}
        <p id="qrState" style="color:var(--muted);font-size:13px;margin-top:8px">Aguardando leitura...</p>
      </div></div>`;
  clearInterval(qrPoll);
  qrPoll = setInterval(async () => {
    try { const st = await api('/instances/' + id + '/status'); if (st.status === 'connected') { clearInterval(qrPoll); document.getElementById('qrState').innerHTML = 'Conectado!'; toast('WhatsApp conectado'); setTimeout(() => { closeModal(); loadConfig(); }, 1200); } } catch (e) { }
  }, 3000);
}
function closeModal() { clearInterval(qrPoll); document.getElementById('modalRoot').innerHTML = ''; }
async function reWebhook(id) { try { const r = await api('/instances/' + id + '/webhook', { method: 'POST', body: JSON.stringify({}) }); toast('Webhook atualizado'); } catch (e) { toast('Erro: ' + e.message); } }
async function discInst(id) { try { await api('/instances/' + id + '/disconnect', { method: 'POST', body: JSON.stringify({}) }); loadConfig(); } catch (e) { toast(e.message); } }
async function defInst(id) { try { await api('/instances/' + id + '/default', { method: 'POST', body: JSON.stringify({}) }); loadConfig(); } catch (e) { toast(e.message); } }
async function delInst(id) { if (!confirm('Excluir instância?')) return; try { await api('/instances/' + id, { method: 'DELETE' }); loadConfig(); } catch (e) { toast(e.message); } }

async function refreshWaStatus() {
  try {
    const list = await api('/instances'); const on = list.find(i => i.status === 'connected');
    document.getElementById('waStatus').innerHTML = on ? `<span class="dot on"></span> ${esc(on.phone || on.name)}` : `<span class="dot off"></span> WhatsApp desconectado`;
  } catch (e) { }
}

/* ===================== BOOT ===================== */
function boot() { loadOverview(); refreshWaStatus(); }
(async function () { await initSupa(); const token = await accessToken(); if (token) enterApp(); })();
</script>
